<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOJUSZ ZZDL - Ranking & Rekrutacja</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #fbbf24;
            --text: #f8fafc;
            --muted: #64748b;
            --lider: #ef4444;
            --sojusz: #3b82f6;
            --dyplomata: #facc15;
            --czlonek: #94a3b8;
            --success: #2ecc71;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- NAGŁÓWEK --- */
        header {
            width: 100%;
            padding: 20px 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #1e293b;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            width: 90%;
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: 900; font-size: 24px; color: var(--accent); text-transform: uppercase; }

        .header-controls { display: flex; gap: 15px; align-items: center; }

        .search-input {
            background: #1e293b; border: 2px solid #334155; padding: 12px 25px;
            border-radius: 50px; color: #fff; width: 200px; transition: 0.4s; outline: none;
        }
        .search-input:focus { width: 280px; border-color: var(--accent); }

        .btn-rekrutacja {
            background: var(--success); color: white; border: none; padding: 12px 25px;
            border-radius: 50px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 12px;
        }

        /* --- TABELA --- */
        main { width: 95%; max-width: 1100px; margin-top: 50px; padding-bottom: 100px; }
        .table { background: var(--card); border-radius: 24px; border: 1px solid #1e293b; overflow: hidden; }
        .row {
            display: grid; grid-template-columns: 60px 80px 1fr 1fr 100px;
            align-items: center; padding: 18px 40px; border-bottom: 1px solid #1e293b; cursor: pointer;
        }
        .head-img { width: 45px; height: 45px; border-radius: 10px; image-rendering: pixelated; border: 2px solid #334155; }
        .elo-pts { font-weight: 900; color: #10b981; text-align: right; font-size: 20px; }

        .badge { padding: 6px 14px; border-radius: 8px; font-size: 10px; font-weight: 900; border: 1px solid; text-transform: uppercase; }
        .b-LIDER { color: var(--lider); border-color: var(--lider); }
        .b-SOJUSZ { color: var(--sojusz); border-color: var(--sojusz); }
        .b-DYPLOMATA { color: var(--dyplomata); border-color: var(--dyplomata); }
        .b-CZŁONEK { color: var(--czlonek); border-color: var(--czlonek); }

        /* --- MODAL --- */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal {
            background: var(--card); padding: 40px; border-radius: 30px; border: 2px solid var(--accent);
            width: 380px; position: relative; text-align: left;
        }
        .modal input {
            width: 100%; padding: 12px; margin: 10px 0; background: #1e293b;
            border: 1px solid #334155; color: white; border-radius: 10px; outline: none;
        }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: var(--lider); }

        #btnWyslij {
            width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 900;
            margin-top: 10px; text-transform: uppercase; cursor: pointer;
        }
        .btn-szary { background: #475569; color: #94a3b8; cursor: not-allowed !important; }
        .btn-zielony { background: var(--success); color: white; }

        /* --- POWIADOMIENIA --- */
        #toast-container { position: fixed; bottom: 20px; left: 20px; z-index: 9999; }
        .toast { background: var(--card); border-left: 4px solid var(--accent); padding: 15px; border-radius: 10px; margin-top: 10px; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="overlay" id="ov-profile">
        <div class="modal" style="text-align: center;">
            <span class="close-btn" onclick="closeAll()">&times;</span>
            <div id="p-content"></div>
        </div>
    </div>

    <div class="overlay" id="ov-rek">
        <div class="modal">
            <span class="close-btn" onclick="closeAll()">&times;</span>
            <h2 style="color: var(--accent); margin: 0 0 20px 0; text-align: center;">Rekrutacja</h2>
            
            <label style="font-size: 11px; font-weight: 900; color: var(--muted);">NICK DISCORD:</label>
            <input type="text" id="rek_dc" placeholder="Twój nick (np. janek#0000)">
            
            <label style="font-size: 11px; font-weight: 900; color: var(--muted);">NICK MINECRAFT:</label>
            <input type="text" id="rek_mc" placeholder="Nick z gry..." oninput="validate()">
            
            <label style="font-size: 11px; font-weight: 900; color: var(--muted);">WIEK:</label>
            <input type="number" id="rek_wiek" placeholder="Twój wiek" oninput="validate()">

            <div id="rek_status" style="font-size: 13px; text-align: center; margin: 10px 0; font-weight: bold;"></div>
            
            <button id="btnWyslij" class="btn-szary" disabled onclick="send()">Wyślij Podanie</button>
        </div>
    </div>

    <header>
        <div class="nav-container">
            <div class="logo">SOJUSZ ZZDL</div>
            <div class="header-controls">
                <input type="text" class="search-input" id="s-in" placeholder="Szukaj gracza..." onkeypress="if(event.key==='Enter') doSearch()">
                <button class="btn-rekrutacja" onclick="openRek()">Rekrutacja</button>
            </div>
        </div>
    </header>

    <main>
        <div class="table" id="l-box"></div>
    </main>

    <script>
        const API = "https://zzdl-ranking-default-rtdb.europe-west1.firebasedatabase.app/ranking.json";
        const WEBHOOK = "https://discord.com/api/webhooks/1502388914877628457/4VwAtEMmjAua_BC4XM3fW5s1XQ6vHE4ubkgDZYDz-DYP7m_mcav7jzKKfglnClQcBPbv";
        let players = [];

        function toast(m) {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = m;
            c.appendChild(t); setTimeout(() => t.remove(), 3000);
        }

        async function load() {
            try {
                const r = await fetch(API);
                const d = await r.json();
                players = Object.values(d).sort((a,b) => (b.elo||0)-(a.elo||0));
                render();
            } catch(e) { toast("Błąd ładowania danych!"); }
        }

        function render() {
            const box = document.getElementById('l-box'); box.innerHTML = '';
            players.forEach((p, i) => {
                const row = document.createElement('div'); row.className = 'row';
                row.onclick = () => showProf(p, i+1);
                row.innerHTML = `
                    <span style="font-weight:900; color:var(--muted)">${i+1}.</span>
                    <img src="https://minotar.net/helm/${p.mc}/45.png" class="head-img">
                    <span class="nick-mc">${p.mc}</span>
                    <div><span class="badge b-${(p.tytul||'CZŁONEK').split(' ')[0]}">${p.tytul||'CZŁONEK'}</span></div>
                    <span class="elo-pts">${p.elo||0}</span>
                `;
                box.appendChild(row);
            });
        }

        function showProf(p, r) {
            document.getElementById('p-content').innerHTML = `
                <img src="https://minotar.net/armor/body/${p.mc}/100.png" style="margin-bottom:15px;">
                <h2 style="margin:0">${p.mc}</h2>
                <p style="color:var(--accent); font-weight:900;">MIEJSCE #${r}</p>
                <p style="font-size:24px; color:var(--success); font-weight:900;">${p.elo||0} ELO</p>
            `;
            document.getElementById('ov-profile').style.display = 'flex';
        }

        function openRek() { document.getElementById('ov-rek').style.display = 'flex'; }
        function closeAll() { document.getElementById('ov-rek').style.display = 'none'; document.getElementById('ov-profile').style.display = 'none'; }

        function validate() {
            const mc = document.getElementById('rek_mc').value.trim().toLowerCase();
            const wiek = document.getElementById('rek_wiek').value;
            const status = document.getElementById('rek_status');
            const btn = document.getElementById('btnWyslij');
            
            const p = players.find(x => x.mc.toLowerCase() === mc);
            
            if(!mc) { status.innerText = ""; setBtn(false); return; }

            if(p) {
                if(p.elo >= 3000) {
                    status.innerText = `✅ Posiadasz ${p.elo} ELO.`;
                    status.style.color = "var(--success)";
                    if(wiek > 0) setBtn(true); else setBtn(false);
                } else {
                    status.innerText = `❌ Masz ${p.elo} ELO (Wymagane 3000).`;
                    status.style.color = "var(--lider)";
                    setBtn(false);
                }
            } else {
                status.innerText = "❌ Nie znaleziono Cię w bazie.";
                status.style.color = "var(--lider)";
                setBtn(false);
            }
        }

        function setBtn(s) {
            const b = document.getElementById('btnWyslij');
            b.disabled = !s; b.className = s ? "btn-zielony" : "btn-szary";
        }

        async function send() {
            const mc = document.getElementById('rek_mc').value;
            const dc = document.getElementById('rek_dc').value;
            const wiek = document.getElementById('rek_wiek').value;
            const p = players.find(x => x.mc.toLowerCase() === mc.toLowerCase());

            const msg = {
                content: "@everyone",
                embeds: [{
                    title: "📩 NOWE PODANIE - REKRUTACJA",
                    color: 3066993,
                    thumbnail: { url: `https://minotar.net/helm/${mc}/100.png` },
                    fields: [
                        { name: "🎮 Gracz", value: mc, inline: true },
                        { name: "💬 Discord", value: dc, inline: true },
                        { name: "🎂 Wiek", value: wiek, inline: true },
                        { name: "📊 ELO", value: p.elo.toString(), inline: true }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };

            try {
                const response = await fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(msg)
                });
                if(response.ok) {
                    toast("✅ Wysłano pomyślnie!");
                    closeAll();
                } else {
                    toast("❌ Błąd Webhooka!");
                }
            } catch(e) {
                toast("❌ Błąd sieci!");
                console.error(e);
            }
        }

        function doSearch() {
            const v = document.getElementById('s-in').value.trim().toLowerCase();
            const p = players.find(x => x.mc.toLowerCase() === v);
            if(p) showProf(p, players.indexOf(p)+1);
            else toast("Nie znaleziono gracza!");
        }

        window.onload = load;
    </script>
</body>
</html>
