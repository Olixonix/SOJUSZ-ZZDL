<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOJUSZ ZZDL - Ranking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #fbbf24;
            --text: #f8fafc;
            --muted: #64748b;
            --lider: #ef4444;
            --sojusz: #3b82f6;
            --dyplomata: #facc15;
            --czlonek: #94a3b8;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- NAGŁÓWEK I WYSZUKIWARKA --- */
        header {
            width: 100%;
            padding: 20px 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #1e293b;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            width: 90%;
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 900;
            font-size: 24px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            background: #1e293b;
            border: 2px solid #334155;
            padding: 12px 25px;
            border-radius: 50px;
            color: #fff;
            width: 260px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
            font-size: 14px;
        }

        .search-input:focus {
            width: 350px;
            border-color: var(--accent);
            box-shadow: 0 0 25px rgba(251, 191, 36, 0.2);
        }

        /* --- TABELA RANKINGOWA --- */
        main { width: 95%; max-width: 1100px; margin-top: 50px; padding-bottom: 100px; }

        .table {
            background: var(--card);
            border-radius: 24px;
            border: 1px solid #1e293b;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .row {
            display: grid;
            grid-template-columns: 60px 80px 1fr 1fr 100px;
            align-items: center;
            padding: 18px 40px;
            border-bottom: 1px solid #1e293b;
            transition: 0.3s;
            cursor: pointer;
        }

        .row:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: scale(1.005);
        }

        .rank-id { font-weight: 900; color: var(--muted); font-size: 18px; }
        
        /* WYŚWIETLANIE SAMEJ GŁÓWKI */
        .head-img {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            border: 2px solid #334155;
            image-rendering: pixelated;
        }

        .nick-mc { font-weight: 700; font-size: 18px; }

        .badge {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            border: 1px solid;
            display: inline-block;
        }
        .b-LIDER { color: var(--lider); border-color: var(--lider); background: rgba(239, 68, 68, 0.1); }
        .b-SOJUSZ { color: var(--sojusz); border-color: var(--sojusz); background: rgba(59, 130, 246, 0.1); }
        .b-DYPLOMATA { color: var(--dyplomata); border-color: var(--dyplomata); background: rgba(250, 204, 21, 0.1); }
        .b-CZŁONEK { color: var(--czlonek); border-color: var(--czlonek); background: rgba(148, 163, 184, 0.1); }

        .elo-pts { font-weight: 900; color: #10b981; text-align: right; font-size: 20px; }

        /* --- POWIADOMIENIA (TOASTY) --- */
        #toast-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 9999;
        }

        .toast {
            background: var(--card);
            border-left: 5px solid var(--accent);
            padding: 16px 25px;
            border-radius: 12px;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: toastSlideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes toastSlideIn {
            from { transform: translateX(-150%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* --- MODAL PROFILU --- */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--card);
            padding: 50px;
            border-radius: 35px;
            border: 2px solid var(--accent);
            text-align: center;
            min-width: 350px;
            position: relative;
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            color: #ef4444;
            font-size: 35px;
            cursor: pointer;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="overlay" id="ov-profile">
        <div class="modal">
            <span class="close-btn" onclick="document.getElementById('ov-profile').style.display='none'">&times;</span>
            <div id="p-content"></div>
        </div>
    </div>

    <header>
        <div class="nav-container">
            <div class="logo">SOJUSZ ZZDL</div>
            <div class="search-box">
                <input type="text" class="search-input" id="s-in" placeholder="Wpisz nick gracza..." onkeypress="if(event.key==='Enter') doSearch()">
            </div>
        </div>
    </header>

    <main>
        <div class="table" id="l-box">
            </div>
    </main>

    <script>
        const API = "https://zzdl-ranking-default-rtdb.europe-west1.firebasedatabase.app/ranking.json";
        let players = [];

        // Funkcja ładująca ładne powiadomienia
        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `<span>🔔</span> ${msg}`;
            container.appendChild(t);
            
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transform = 'translateX(-20px)';
                t.style.transition = '0.5s';
                setTimeout(() => t.remove(), 500);
            }, 3500);
        }

        async function loadData() {
            try {
                const r = await fetch(API);
                const d = await r.json();
                if(!d) return;

                players = Object.values(d).sort((a,b) => (b.elo||0) - (a.elo||0));
                
                const box = document.getElementById('l-box');
                box.innerHTML = '';

                players.forEach((p, i) => {
                    const t = p.tytul || "CZŁONEK";
                    const row = document.createElement('div');
                    row.className = 'row';
                    row.style.animation = `rowFade 0.5s ease forwards ${i * 0.05}s`;
                    row.onclick = () => showProfile(p, i+1);
                    
                    row.innerHTML = `
                        <span class="rank-id">${i+1}.</span>
                        <img src="https://minotar.net/helm/${p.mc}/45.png" class="head-img">
                        <span class="nick-mc">${p.mc}</span>
                        <div><span class="badge b-${t.split(' ')[0]}">${t}</span></div>
                        <span class="elo-pts">${p.elo||0}</span>
                    `;
                    box.appendChild(row);
                });
                showToast("Ranking został wczytany!");
            } catch(e) { 
                showToast("❌ Błąd połączenia z bazą!");
            }
        }

        function showProfile(p, rank) {
            const t = p.tytul || "CZŁONEK";
            document.getElementById('p-content').innerHTML = `
                <img src="https://minotar.net/armor/body/${p.mc}/120.png" style="width:120px; margin-bottom:20px;">
                <div style="font-size:32px; font-weight:900; margin-bottom:5px;">${p.mc}</div>
                <div class="badge b-${t.split(' ')[0]}" style="margin-bottom:25px;">${t}</div>
                <div style="display:flex; justify-content:space-around; background:rgba(0,0,0,0.2); padding:20px; border-radius:20px;">
                    <div><div style="font-size:11px; color:var(--muted); font-weight:800;">MIEJSCE</div><div style="font-size:24px; font-weight:900; color:var(--accent);">#${rank}</div></div>
                    <div><div style="font-size:11px; color:var(--muted); font-weight:800;">PUNKTY ELO</div><div style="font-size:24px; font-weight:900; color:#10b981;">${p.elo||0}</div></div>
                </div>
            `;
            document.getElementById('ov-profile').style.display = 'flex';
        }

        function doSearch() {
            const val = document.getElementById('s-in').value.trim().toLowerCase();
            const p = players.find(x => x.mc.toLowerCase() === val);
            
            if(p) {
                showProfile(p, players.indexOf(p) + 1);
            } else {
                showToast("❌ Nie znaleziono gracza o tym nicku!");
            }
            document.getElementById('s-in').value = '';
        }

        window.onload = loadData;
    </script>
</body>
</html>
